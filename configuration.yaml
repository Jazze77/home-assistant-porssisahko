# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# UUSI OSIO: Tämä hoitaa kulutusseurannan ja historian automaattisesti


utility_meter:
  wiz_kulutus_paiva:
    source: input_number.wiz_paivan_kulutus_kwh
    cycle: daily
    unique_id: wiz_consumption_daily_meter
    name: "WiZ Kulutus (Päivittäinen)"
  wiz_kustannus_paiva:
    source: input_number.wiz_paivan_kustannus_euroa
    cycle: daily
    unique_id: wiz_cost_daily_meter
    name: "WiZ Kustannus (Päivittäinen)"

sensor:
  - platform: statistics
    name: "WiZ Pistoke 15min Keskiarvo"
    unique_id: wiz_socket_15min_stats
    entity_id: sensor.wiz_socket_900c4e_power
    state_characteristic: mean
    max_age:
      minutes: 15
    sampling_size: 4000
    precision: 2
    
  - platform: statistics
    name: "WiZ Lämmitin 15min Keskiarvo"
    unique_id: wiz_socket_98d017_15min_stats
    entity_id: sensor.wiz_socket_98d017_power
    state_characteristic: mean
    max_age:
      minutes: 15
    sampling_size: 4000
    precision: 2
    

template:
  # TAVALLISET SENSORIT (Päivittyvät tilan mukaan)
  - sensor:
      - name: "Valitut jaksot kpl"
        unique_id: valitut_jaksot_count
        state: >
          {% set l = states('input_text.valitut_jaksot_luonnos').split(',') | map('trim') | reject('eq', '') | list | length %}
          {% set g = states('input_text.valitut_jaksot_grid').split(',') | map('trim') | reject('eq', '') | list | length %}
          {{ l + g }}
        unit_of_measurement: "kpl"
        icon: mdi:counter
        attributes:
          # Luonnos (Automaatti)
          luonnos_kpl: >
            {{ states('input_text.valitut_jaksot_luonnos').split(',') | map('trim') | reject('eq', '') | list | length }}
          luonnos_kesto_teksti: >
            {% set kpl = states('input_text.valitut_jaksot_luonnos').split(',') | map('trim') | reject('eq', '') | list | length %}
            {{ (kpl * 15) // 60 }}h {{ (kpl * 15) % 60 }}min
          
          # Grid (Käyttäjän valinnat)
          grid_kpl: >
            {{ states('input_text.valitut_jaksot_grid').split(',') | map('trim') | reject('eq', '') | list | length }}
          grid_kesto_h: >
            {% set kpl = states('input_text.valitut_jaksot_grid').split(',') | map('trim') | reject('eq', '') | list | length %}
            {{ (kpl * 15) // 60 }}
          grid_kesto_min: >
            {% set kpl = states('input_text.valitut_jaksot_grid').split(',') | map('trim') | reject('eq', '') | list | length %}
            {{ (kpl * 15) % 60 }}
          grid_kesto_teksti: >
            {% set kpl = states('input_text.valitut_jaksot_grid').split(',') | map('trim') | reject('eq', '') | list | length %}
            {{ (kpl * 15) // 60 }}h {{ (kpl * 15) % 60 }}min

          # Yhteensä (Kaikki)
          yhteensa_kesto_teksti: >
            {% set kpl = states('sensor.valitut_jaksot_kpl') | int(0) %}
            {{ (kpl * 15) // 60 }}h {{ (kpl * 15) % 60 }}min
  - sensor:
      - name: "Valitut jaksot kpl v2"
        unique_id: valitut_jaksot_count_v2
        state: >
          {% set l = states('input_text.valitut_jaksot_luonnos_v2').split(',') | map('trim') | reject('eq', '') | list | length %}
          {% set g = states('input_text.valitut_jaksot_grid_v2').split(',') | map('trim') | reject('eq', '') | list | length %}
          {{ l + g }}
        unit_of_measurement: "jaksoa"
        icon: mdi:counter
        attributes:
          # Luonnos (Automaatti v2)
          luonnos_kpl: >
            {{ states('input_text.valitut_jaksot_luonnos_v2').split(',') | map('trim') | reject('eq', '') | list | length }}
          luonnos_kesto_teksti: >
            {% set kpl = states('input_text.valitut_jaksot_luonnos_v2').split(',') | map('trim') | reject('eq', '') | list | length %}
            {{ (kpl * 15) // 60 }}h {{ (kpl * 15) % 60 }}min
          
          # Grid (Käyttäjän valinnat v2)
          grid_kpl: >
            {{ states('input_text.valitut_jaksot_grid_v2').split(',') | map('trim') | reject('eq', '') | list | length }}
          grid_kesto_h: >
            {% set kpl = states('input_text.valitut_jaksot_grid_v2').split(',') | map('trim') | reject('eq', '') | list | length %}
            {{ (kpl * 15) // 60 }}
          grid_kesto_min: >
            {% set kpl = states('input_text.valitut_jaksot_grid_v2').split(',') | map('trim') | reject('eq', '') | list | length %}
            {{ (kpl * 15) % 60 }}
          grid_kesto_teksti: >
            {% set kpl = states('input_text.valitut_jaksot_grid_v2').split(',') | map('trim') | reject('eq', '') | list | length %}
            {{ (kpl * 15) // 60 }}h {{ (kpl * 15) % 60 }}min

          # Yhteensä (Kaikki v2)
          yhteensa_kesto_teksti: >
            {% set kpl = states('sensor.valitut_jaksot_kpl_v2') | int(0) %}
            {{ (kpl * 15) // 60 }}h {{ (kpl * 15) % 60 }}min

      # --- SÄHKÖAUTO (v1) ---
  - binary_sensor:
      - name: "Lataussuunnitelma muuttunut"
        unique_id: lataussuunnitelma_muuttunut
        state: >-
          {# PURETAAN LISTAT JA SUODATETAAN POIS TYHJÄT SEKÄ HAAMULAINAUSMERKIT #}
          {% set luonnos_raw = states('input_text.valitut_jaksot_luonnos').split(',') | map('trim') | reject('eq', '') | reject('eq', '""') | reject('eq', "''") | list %}
          {% set grid_raw = states('input_text.valitut_jaksot_grid').split(',') | map('trim') | reject('eq', '') | reject('eq', '""') | reject('eq', "''") | list %}
          {% set aktiivinen_raw = states('input_text.valitut_jaksot_aktiivinen').split(',') | map('trim') | reject('eq', '') | reject('eq', '""') | reject('eq', "''") | list %}

          {# Tehdään numeromuunnos vain jos listalla on oikeita numeroita #}
          {% set luonnos = luonnos_raw | map('int') | list if luonnos_raw | length > 0 else [] %}
          {% set grid = grid_raw | map('int') | list if grid_raw | length > 0 else [] %}
          {% set aktiivinen = aktiivinen_raw | map('int') | sort | list if aktiivinen_raw | length > 0 else [] %}

          {% set ehdotus = (luonnos + grid) | unique | sort | list %}
          {{ ehdotus != aktiivinen }}

  - binary_sensor:
      # --- LÄMMITTIMEN VAKAUTETTU MUUTTUNUT-SENSORI ---
      - name: "Lataussuunnitelma muuttunut v2"
        unique_id: lataussuunnitelma_muuttunut_v2
        state: >-
          {# PURETAAN LÄMMITTIMEN LISTAT JA SUODATETAAN HAAMUT POIS #}
          {% set luonnos_raw = states('input_text.valitut_jaksot_luonnos_v2').split(',') | map('trim') | reject('eq', '') | reject('eq', '""') | reject('eq', "''") | list %}
          {% set grid_raw = states('input_text.valitut_jaksot_grid_v2').split(',') | map('trim') | reject('eq', '') | reject('eq', '""') | reject('eq', "''") | list %}
          {% set aktiivinen_raw = states('input_text.valitut_jaksot_aktiivinen_v2').split(',') | map('trim') | reject('eq', '') | reject('eq', '""') | reject('eq', "''") | list %}

          {# Tehdään numeromuunnos vain jos listalla on oikeita numeroita #}
          {% set luonnos = luonnos_raw | map('int') | list if luonnos_raw | length > 0 else [] %}
          {% set grid = grid_raw | map('int') | list if grid_raw | length > 0 else [] %}
          {% set aktiivinen = aktiivinen_raw | map('int') | sort | list if aktiivinen_raw | length > 0 else [] %}

          {% set ehdotus = (luonnos + grid) | unique | sort | list %}
          {{ ehdotus != aktiivinen }}


 # TRIGGERI-POHJAISET SENSORIT (Päivittyvät listattujen muutosten mukaan)
  - trigger:
      - platform: state
        entity_id: 
          - sensor.nordpool_kwh_fi_eur_3_10_0255
          - input_text.valitut_jaksot_luonnos
          - input_text.valitut_jaksot_grid # LISÄTTY TÄMÄ
    sensor:
      - name: "Nordpool Oma"
        unique_id: nordpool_oma_v4_minimal
        state: "{{ states('sensor.nordpool_kwh_fi_eur_3_10_0255') }}"
        unit_of_measurement: "snt/kWh"
        attributes:
          tomorrow_valid: "{{ state_attr('sensor.nordpool_kwh_fi_eur_3_10_0255', 'tomorrow_valid') }}"
          min_price: >
            {% set t = state_attr('sensor.nordpool_kwh_fi_eur_3_10_0255', 'today') or [] %}
            {% set h = state_attr('sensor.nordpool_kwh_fi_eur_3_10_0255', 'tomorrow') or [] %}
            {{ (t + h) | map('float') | min | default(0) }}
          max_price: >
            {% set t = state_attr('sensor.nordpool_kwh_fi_eur_3_10_0255', 'today') or [] %}
            {% set h = state_attr('sensor.nordpool_kwh_fi_eur_3_10_0255', 'tomorrow') or [] %}
            {{ (t + h) | map('float') | max | default(1) }}
          last_valid_price_time: >
            {% set data = state_attr('sensor.nordpool_oma', 'raw_today_and_tomorrow') %}
            {% if data and data | length > 0 %}
              {% set last_org = data | map(attribute='org') | max %}
              {% set startOfDay = now().replace(hour=0, minute=0, second=0, microsecond=0) %}
              {{ (startOfDay + timedelta(minutes=last_org * 15)).strftime('%Y-%m-%d %H:%M') }}
            {% else %}
              unknown
            {% endif %}            
          raw_today_and_tomorrow: >
            {% set today = state_attr('sensor.nordpool_kwh_fi_eur_3_10_0255', 'raw_today') or [] %}
            {% set tomorrow = state_attr('sensor.nordpool_kwh_fi_eur_3_10_0255', 'raw_tomorrow') or [] %}
            {% set valid = state_attr('sensor.nordpool_kwh_fi_eur_3_10_0255', 'tomorrow_valid') %}
            {% set combined = today + (tomorrow if (valid and tomorrow) else []) %}
            
            {# Haetaan molemmat listat ja yhdistetään ne tarkistusta varten #}
            {% set luonnos = states('input_text.valitut_jaksot_luonnos').replace(' ', '').split(',') %}
            {% set grid = states('input_text.valitut_jaksot_grid').replace(' ', '').split(',') %}
            {% set kaikki_valitut = luonnos + grid %}
            
            {% set min_p = (combined | map(attribute='value') | map('float') | min | default(0)) %}
            {% set max_p = (combined | map(attribute='value') | map('float') | max | default(1)) %}
            {% set range_p = max_p - min_p %}
            {% set sorted_prices = combined | map(attribute='value') | map('float') | sort | list %}
            
            {% set ns = namespace(data=[]) %}
            {% for i in range(combined | length) %}
              {% set price = combined[i].value | float %}
              {% set prosentti = ((price - min_p) / (range_p if range_p > 0 else 1)) * 100 %}
              
             {# VÄRILOGIIKKA: Tarkistetaan löytyykö indeksi kummasta tahansa listasta #}
              {% if i | string in kaikki_valitut %}
                {% set vari = '#2196f3' %} {# Sininen #}
              {% else %}
                {% set vari = '#f44336' %} {# Punainen oletus #}
                {% if prosentti < 15 %}{% set vari = '#1b5e20' %}
                {% elif prosentti < 30 %}{% set vari = '#4caf50' %}
                {% elif prosentti < 50 %}{% set vari = '#8bc34a' %}
                {% elif prosentti < 70 %}{% set vari = '#ffeb3b' %}
                {% elif prosentti < 90 %}{% set vari = '#ff9800' %}
                {% endif %}
              {% endif %}

              {% set ns.data = ns.data + [{
                'org': i, 
                'prc': sorted_prices.index(price), 
                'val': price,
                'color': vari
              }] %}
            {% endfor %}
            {{ ns.data }}              

  - trigger:
      - platform: state
        entity_id: 
          - sensor.nordpool_kwh_fi_eur_3_10_0255
          - input_text.valitut_jaksot_luonnos_v2
          - input_text.valitut_jaksot_grid_v2
    sensor:
      - name: "Nordpool Oma Lämmitin"
        unique_id: nordpool_oma_lammitin
        state: "{{ states('sensor.nordpool_kwh_fi_eur_3_10_0255') }}"
        attributes:
          raw_today_and_tomorrow: >
            {% set s = states('sensor.nordpool_kwh_fi_eur_3_10_0255') %}
            {% if s not in ['unknown', 'unavailable'] %}
              {% set nordpool = state_attr('sensor.nordpool_kwh_fi_eur_3_10_0255', 'raw_today') + state_attr('sensor.nordpool_kwh_fi_eur_3_10_0255', 'raw_tomorrow') %}
              {% set luonnos = states('input_text.valitut_jaksot_luonnos_v2').split(',') | map('trim') | reject('eq','') | list %}
              {% set grid = states('input_text.valitut_jaksot_grid_v2').split(',') | map('trim') | reject('eq','') | list %}
              {% set valitut = (luonnos + grid) | map('int') | unique | list %}
              
              {% set ns = namespace(res=[]) %}
              {% for i in range(nordpool | length) %}
                {% set h = nordpool[i] %}
                {% set is_selected = i in valitut %}
                {# Käytetään Lämmittimelle eri väriä, esim. vihreää #}
                {% set color = '#4CAF50' if is_selected else '#ff9800' %}
                {% set ns.res = ns.res + [{'org': i, 'val': h.value, 'color': color}] %}
              {% endfor %}
              {{ ns.res }}
            {% else %} [] {% endif %}


  - trigger:
      - platform: state
        entity_id: 
          - sensor.nordpool_kwh_fi_eur_3_10_0255
          - input_text.valitut_jaksot_aktiivinen
          - input_text.valitut_jaksot_aktiivinen_v2
    sensor:
      - name: "Nordpool Yhdistetty Master"
        unique_id: nordpool_yhdistetty_master
        state: "{{ states('sensor.nordpool_kwh_fi_eur_3_10_0255') }}"
        attributes:
          raw_today_and_tomorrow: >
            {% set s = states('sensor.nordpool_kwh_fi_eur_3_10_0255') %}
            {% if s not in ['unknown', 'unavailable'] %}
              {% set nordpool = state_attr('sensor.nordpool_kwh_fi_eur_3_10_0255', 'raw_today') + state_attr('sensor.nordpool_kwh_fi_eur_3_10_0255', 'raw_tomorrow') %}
              {% set auto_list = states('input_text.valitut_jaksot_aktiivinen').split(',') | map('trim') | reject('eq','') | list %}
              {% set lammitin_list = states('input_text.valitut_jaksot_aktiivinen_v2').split(',') | map('trim') | reject('eq','') | list %}
              
              {% set ns = namespace(res=[]) %}
              {% for i in range(nordpool | length) %}
                {% set h = nordpool[i] %}
                {% set auto_on = i | string in auto_list %}
                {% set lammitin_on = i | string in lammitin_list %}
                
                {# MÄÄRITETÄÄN VÄRI VARAUKSEN MUKAAN #}
                {% if auto_on and lammitin_on %}
                  {% set color = '#f44336' %} {# MOLEMMAT PÄÄLLÄ (Punainen) #}
                {% elif auto_on %}
                  {% set color = '#2196F3' %} {# VAIN SÄHKÖAUTO (Sininen) #}
                {% elif lammitin_on %}
                  {% set color = '#9C27B0' %} {# VAIN LÄMMITIN (Violetti) #}
                {% else %}
                  {# Normaalit hintavärit (Vihreä jos halpa, muuten oranssi/keltainen) #}
                  {% set color = '#4CAF50' if h.value < 5 else '#ff9800' %}
                {% endif %}
                
                {% set ns.res = ns.res + [{'org': i, 'val': h.value, 'color': color}] %}
              {% endfor %}
              {{ ns.res }}
            {% else %} [] {% endif %}


  # =================================================================
  # SÄHKÖAUTO (v1) - VIIMEISIN SUORITETTU LATAUS (ITSESTÄÄN RIIPPUMATON)
  # =================================================================
  - trigger:
      - platform: state
        entity_id: 
          - automation.reaaliaikainen_lataus_v1_1
          - automation.latauksen_simulaatio_v1_2
        from: "on"
        to: "off"
    sensor:
      - name: "Viimeisin Suoritettu Lataus"
        unique_id: viimeisin_suoritettu_lataus
        state: "{{ now().strftime('%d.%m.%Y %H:%M') }}"
        attributes:
          tyyppi: >
            {% if is_state('automation.reaaliaikainen_lataus_v1_1', 'off') and (as_timestamp(now()) - as_timestamp(states.automation.reaaliaikainen_lataus_v1_1.last_changed) < 30) %}
              Reaaliaikainen v1.1
            {% else %}
              Simulaatio v1.2
            {% endif %}
          tallennus_aika: "{{ state_attr('sensor.lataus_suunnitelma', 'tallennus_aika') }}"
          lataus_aloitettu: "{{ states('input_datetime.lataus_aloitettu_klo') }}"
          valmis_aika: "{{ now().strftime('%d.%m.%Y klo %H:%M:%S') }}"
          
          jaksot: >
            {% set jaksot = state_attr('sensor.lataus_suunnitelma', 'jaksot') or [] %}
            {% set t_aloitus = states('input_datetime.lataus_aloitettu_klo') %}
            {% set dt = as_datetime(t_aloitus) %}
            {% set m = (dt.minute // 15) * 15 if dt else 0 %}
            {% set aloitus_ts = as_timestamp(dt.replace(minute=m, second=0, microsecond=0)) if dt else 0 %}
            
            {% set t1 = states('input_text.lataus_tehot_luonnos') | replace(',*', '') | replace('*', '') %}
            {% set t2 = states('input_text.lataus_tehot_luonnos_part2') %}
            {% set koko_teksti = t1 if t2 == "" else t1 ~ "," ~ t2 %}
            {% set raw_tehot = koko_teksti.split(',') | map('trim') | reject('eq', '') | list %}
            
            {% set ns_tehot = namespace(parit=[]) %}
            {% for r in raw_tehot %}
              {% set osat = r.split(':') %}
              {% if osat | length == 2 %}
                {% set ns_tehot.parit = ns_tehot.parit + [{'idx': osat[0]|string, 'w': osat[1]|float(0)}] %}
              {% endif %}
            {% endfor %}

            {% set ns = namespace(res=[], kpl=0) %}
            {% for p in jaksot %}
              {% set osat = p.aloitus.split(' ') %}
              {% if osat | length == 2 %}
                {% set pvm = osat[0].split('.') %}
                {% set iso_p = pvm[2] ~ "-" ~ pvm[1] ~ "-" ~ pvm[0] ~ "T" ~ osat[1] %}
                {% set jakso_ts = as_timestamp(iso_p) %}

                {% if jakso_ts >= aloitus_ts and ns.kpl < raw_tehot | length %}
                  {% set haku = ns_tehot.parit | selectattr('idx', 'eq', p.idx | string) | first | default(none) %}
                  {% set t_w = haku.w if haku is not none else 0 %}
                  
                  {% set ns.res = ns.res + [{
                    'time': jakso_ts * 1000,
                    'klo': p.aloitus,
                    'hinta': p.hinta | float(0),
                    'teho': t_w,
                    'ajetaanko': p.ladataanko
                  }] %}
                  {% set ns.kpl = ns.kpl + 1 %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.res }}
          
          # LASKETAAN KULUTUS SUORAAN TALLENNUSHETKEN RAAKADASTA
          ladattu_kwh: >-
            {% set jaksot = state_attr('sensor.lataus_suunnitelma', 'jaksot') or [] %}
            {% set t_aloitus = states('input_datetime.lataus_aloitettu_klo') %}
            {% set dt = as_datetime(t_aloitus) %}
            {% set m = (dt.minute // 15) * 15 if dt else 0 %}
            {% set aloitus_ts = as_timestamp(dt.replace(minute=m, second=0, microsecond=0)) if dt else 0 %}
            {% set t1 = states('input_text.lataus_tehot_luonnos') | replace(',*', '') | replace('*', '') %}
            {% set t2 = states('input_text.lataus_tehot_luonnos_part2') %}
            {% set koko_teksti = t1 if t2 == "" else t1 ~ "," ~ t2 %}
            {% set raw_tehot = koko_teksti.split(',') | map('trim') | reject('eq', '') | list %}
            
            {% set ns_tehot = namespace(parit=[]) %}
            {% for r in raw_tehot %}
              {% set osat = r.split(':') %}
              {% if osat | length == 2 %}
                {% set ns_tehot.parit = ns_tehot.parit + [{'idx': osat[0]|string, 'w': osat[1]|float(0)}] %}
              {% endif %}
            {% endfor %}
            {% set ns = namespace(kwh=0, kpl=0) %}
            {% for p in jaksot %}
              {% set osat = p.aloitus.split(' ') %}
              {% if osat | length == 2 %}
                {% set pvm = osat[0].split('.') %}
                {% set iso_p = pvm[2] ~ "-" ~ pvm[1] ~ "-" ~ pvm[0] ~ "T" ~ osat[1] %}
                {% if as_timestamp(iso_p) >= aloitus_ts and ns.kpl < raw_tehot | length %}
                  {% set haku = ns_tehot.parit | selectattr('idx', 'eq', p.idx | string) | first | default(none) %}
                  {% set t_w = haku.w if haku is not none else 0 %}
                  {% if p.ladataanko == 'KYLLÄ' %}
                    {% set ns.kwh = ns.kwh + (t_w / 1000 * 0.25) %}
                  {% endif %}
                  {% set ns.kpl = ns.kpl + 1 %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.kwh | round(2) }}

          # LASKETAAN KUSTANNUS SUORAAN TALLENNUSHETKEN RAAKADASTA
          ladattu_eur: >-
            {% set jaksot = state_attr('sensor.lataus_suunnitelma', 'jaksot') or [] %}
            {% set t_aloitus = states('input_datetime.lataus_aloitettu_klo') %}
            {% set dt = as_datetime(t_aloitus) %}
            {% set m = (dt.minute // 15) * 15 if dt else 0 %}
            {% set aloitus_ts = as_timestamp(dt.replace(minute=m, second=0, microsecond=0)) if dt else 0 %}
            {% set t1 = states('input_text.lataus_tehot_luonnos') | replace(',*', '') | replace('*', '') %}
            {% set t2 = states('input_text.lataus_tehot_luonnos_part2') %}
            {% set koko_teksti = t1 if t2 == "" else t1 ~ "," ~ t2 %}
            {% set raw_tehot = koko_teksti.split(',') | map('trim') | reject('eq', '') | list %}
            
            {% set ns_tehot = namespace(parit=[]) %}
            {% for r in raw_tehot %}
              {% set osat = r.split(':') %}
              {% if osat | length == 2 %}
                {% set ns_tehot.parit = ns_tehot.parit + [{'idx': osat[0]|string, 'w': osat[1]|float(0)}] %}
              {% endif %}
            {% endfor %}
            {% set ns = namespace(snt=0, kpl=0) %}
            {% for p in jaksot %}
              {% set osat = p.aloitus.split(' ') %}
              {% if osat | length == 2 %}
                {% set pvm = osat[0].split('.') %}
                {% set iso_p = pvm[2] ~ "-" ~ pvm[1] ~ "-" ~ pvm[0] ~ "T" ~ osat[1] %}
                {% if as_timestamp(iso_p) >= aloitus_ts and ns.kpl < raw_tehot | length %}
                  {% set haku = ns_tehot.parit | selectattr('idx', 'eq', p.idx | string) | first | default(none) %}
                  {% set t_w = haku.w if haku is not none else 0 %}
                  {% if p.ladataanko == 'KYLLÄ' %}
                    {% set ns.snt = ns.snt + (p.hinta | float(0) * (t_w / 1000 * 0.25)) %}
                  {% endif %}
                  {% set ns.kpl = ns.kpl + 1 %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ (ns.snt / 100) | round(2) }}

    # =================================================================
  # LÄMMITIN (v2) - VIIMEISIN LÄMMITIN LATAUS (POMMINVARMA AIKALEIMA)
  # =================================================================
  - trigger:
      - platform: state
        entity_id: 
          - automation.reaaliaikainen_lataus_lammitin
          - automation.latauksen_simulaatio_lammitin
        from: "on"
        to: "off"
    sensor:
      - name: "Viimeisin Lämmitin Lataus"
        unique_id: viimeisin_lammitin_lataus
        state: "{{ now().strftime('%d.%m.%Y %H:%M') }}"
        attributes:
          tyyppi: >
            {% if is_state('automation.reaaliaikainen_lataus_lammitin', 'off') and (as_timestamp(now()) - as_timestamp(states.automation.reaaliaikainen_lataus_lammitin.last_changed) < 30) %}
              Reaaliaikainen v2.1
            {% else %}
              Simulaatio v2.2
            {% endif %}
          tallennus_aika: "{{ state_attr('sensor.lataus_suunnitelma_lammitin', 'tallennus_aika') }}"
          lataus_aloitettu: "{{ states('input_datetime.lataus_aloitettu_klo_v2') }}"
          valmis_aika: "{{ now().strftime('%d.%m.%Y klo %H:%M:%S') }}"
          
          jaksot: >
            {% set jaksot = state_attr('sensor.lataus_suunnitelma_lammitin', 'jaksot') or [] %}
            {% set t_aloitus = states('input_datetime.lataus_aloitettu_klo_v2') %}
            {% set dt_alku = as_datetime(t_aloitus) %}
            {% set m_alku = (dt_alku.minute // 15) * 15 if dt_alku else 0 %}
            {% set aloitus_ts = as_timestamp(dt_alku.replace(minute=m_alku, second=0, microsecond=0)) if dt_alku else 0 %}
            
            {% set t1 = states('input_text.lataus_tehot_luonnos_v2') | replace(',*', '') | replace('*', '') %}
            {% set t2 = states('input_text.lataus_tehot_luonnos_v2_part2') %}
            {% set koko_teksti = t1 if t2 == "" else t1 ~ "," ~ t2 %}
            {% set raw_tehot = koko_teksti.split(',') | map('trim') | reject('eq', '') | list %}
            {% set ns_tehot = namespace(parit=[]) %}
            {% for r in raw_tehot %}
              {% set osat = r.split(':') %}
              {% if osat | length == 2 %}
                {% set ns_tehot.parit = ns_tehot.parit + [{'idx': osat[0]|string, 'w': osat[1]|float(0)}] %}
              {% endif %}
            {% endfor %}

            {% set ns = namespace(res=[], kpl=0) %}
            {% for p in jaksot %}
              {# MUUTRETAAN SUOMALAINEN AIKA SUORAAN JINJA-AIKAKSI ILMAN SPLITTEJÄ #}
              {% set p_osat = p.aloitus.split(' ') %}
              {% set pvm = p_osat[0].split('.') %}
              {% set iso_p = pvm[2] ~ "-" ~ pvm[1] ~ "-" ~ pvm[0] ~ "T" ~ p_osat[1] %}
              {% set jakso_ts = as_timestamp(iso_p) %}

              {% if jakso_ts >= aloitus_ts and ns.kpl < raw_tehot | length %}
                {% set haku = ns_tehot.parit | selectattr('idx', 'eq', p.idx | string) | first | default(none) %}
                {% set t_w = haku.w if haku is not none else 0 %}
                
                {% set ns.res = ns.res + [{
                  'time': jakso_ts * 1000,
                  'klo': p.aloitus,
                  'hinta': p.hinta | float(0),
                  'teho': t_w,
                  'ajetaanko': p.ladataanko
                }] %}
                {% set ns.kpl = ns.kpl + 1 %}
              {% endif %}
            {% endfor %}
            {{ ns.res }}
          
          ladattu_kwh: >-
            {% set jaksot = state_attr('sensor.lataus_suunnitelma_lammitin', 'jaksot') or [] %}
            {% set t_aloitus = states('input_datetime.lataus_aloitettu_klo_v2') %}
            {% set dt_alku = as_datetime(t_aloitus) %}
            {% set m_alku = (dt_alku.minute // 15) * 15 if dt_alku else 0 %}
            {% set aloitus_ts = as_timestamp(dt_alku.replace(minute=m_alku, second=0, microsecond=0)) if dt_alku else 0 %}
            
            {% set t1 = states('input_text.lataus_tehot_luonnos_v2') | replace(',*', '') | replace('*', '') %}
            {% set t2 = states('input_text.lataus_tehot_luonnos_v2_part2') %}
            {% set koko_teksti = t1 if t2 == "" else t1 ~ "," ~ t2 %}
            {% set raw_tehot = koko_teksti.split(',') | map('trim') | reject('eq', '') | list %}
            {% set ns_tehot = namespace(parit=[]) %}
            {% for r in raw_tehot %}
              {% set osat = r.split(':') %}
              {% if osat | length == 2 %}
                {% set ns_tehot.parit = ns_tehot.parit + [{'idx': osat[0]|string, 'w': osat[1]|float(0)}] %}
              {% endif %}
            {% endfor %}
            {% set ns = namespace(kwh=0, kpl=0) %}
            {% for p in jaksot %}
              {% set p_osat = p.aloitus.split(' ') %}
              {% set pvm = p_osat[0].split('.') %}
              {% set iso_p = pvm[2] ~ "-" ~ pvm[1] ~ "-" ~ pvm[0] ~ "T" ~ p_osat[1] %}
              {% if as_timestamp(iso_p) >= aloitus_ts and ns.kpl < raw_tehot | length %}
                {% set haku = ns_tehot.parit | selectattr('idx', 'eq', p.idx | string) | first | default(none) %}
                {% set t_w = haku.w if haku is not none else 0 %}
                {% if p.ladataanko == 'KYLLÄ' %}
                  {% set ns.kwh = ns.kwh + (t_w / 1000 * 0.25) %}
                {% endif %}
                {% set ns.kpl = ns.kpl + 1 %}
              {% endif %}
            {% endfor %}
            {{ ns.kwh | round(2) }}

          ladattu_eur: >-
            {% set jaksot = state_attr('sensor.lataus_suunnitelma_lammitin', 'jaksot') or [] %}
            {% set t_aloitus = states('input_datetime.lataus_aloitettu_klo_v2') %}
            {% set dt_alku = as_datetime(t_aloitus) %}
            {% set m_alku = (dt_alku.minute // 15) * 15 if dt_alku else 0 %}
            {% set aloitus_ts = as_timestamp(dt_alku.replace(minute=m_alku, second=0, microsecond=0)) if dt_alku else 0 %}
            
            {% set t1 = states('input_text.lataus_tehot_luonnos_v2') | replace(',*', '') | replace('*', '') %}
            {% set t2 = states('input_text.lataus_tehot_luonnos_v2_part2') %}
            {% set koko_teksti = t1 if t2 == "" else t1 ~ "," ~ t2 %}
            {% set raw_tehot = koko_teksti.split(',') | map('trim') | reject('eq', '') | list %}
            {% set ns_tehot = namespace(parit=[]) %}
            {% for r in raw_tehot %}
              {% set osat = r.split(':') %}
              {% if osat | length == 2 %}
                {% set ns_tehot.parit = ns_tehot.parit + [{'idx': osat[0]|string, 'w': osat[1]|float(0)}] %}
              {% endif %}
            {% endfor %}
            {% set ns = namespace(snt=0, kpl=0) %}
            {% for p in jaksot %}
              {% set p_osat = p.aloitus.split(' ') %}
              {% set pvm = p_osat[0].split('.') %}
              {% set iso_p = pvm[2] ~ "-" ~ pvm[1] ~ "-" ~ pvm[0] ~ "T" ~ p_osat[1] %}
              {% if as_timestamp(iso_p) >= aloitus_ts and ns.kpl < raw_tehot | length %}
                {% set haku = ns_tehot.parit | selectattr('idx', 'eq', p.idx | string) | first | default(none) %}
                {% set t_w = haku.w if haku is not none else 0 %}
                {% if p.ladataanko == 'KYLLÄ' %}
                  {% set ns.snt = ns.snt + (p.hinta | float(0) * (t_w / 1000 * 0.25)) %}
                {% endif %}
                  {% set ns.kpl = ns.kpl + 1 %}
              {% endif %}
            {% endfor %}
            {{ (ns.snt / 100) | round(2) }}


  # =================================================================
  # SÄHKÖAUTON (v1) HISTORIA-ARKISTOT
  # =================================================================
  - trigger:
