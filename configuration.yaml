            {% if 'Simulaatio' in state_attr(s, 'tyyppi') | string %}
              {# TALLENNETAAN ALOITUS JA LOPETUS MYÖS AUTON SIMULAATIOLLE #}
              {% set uusi = {
                'aloitus': as_datetime(state_attr(s, 'lataus_aloitettu')).strftime('%d.%m.%Y %H:%M'),
                'lopetus': state_attr(s, 'valmis_aika').replace(' klo ', ' '),
                'kWh': state_attr(s, 'ladattu_kwh') | float(0),
                'eur': state_attr(s, 'ladattu_eur') | float(0)
              } %}
              {{ ([uusi] + vanhat)[:20] }}
            {% else %}
              {{ vanhat }}
            {% endif %}


