  - trigger:
      - platform: state
        entity_id: input_text.lataus_suunnitelman_jaksot
    sensor:
      - name: "Lataus Suunnitelma"
        unique_id: lataus_suunnitelma
        state: "{{ now().strftime('%d.%m.%Y %H:%M:%S') }}"
        unit_of_measurement: "jaksoa"
        attributes:
          tallennus_aika: "{{ now().strftime('%d.%m.%Y klo %H:%M:%S') }}"
          jaksot: >
            {% set s_aktiivinen = states('input_text.lataus_suunnitelman_jaksot') %}
            {% set aktiiviset = s_aktiivinen.split(',') | map('trim') | reject('eq', '') | map('int') | list if s_aktiivinen not in ['unknown', 'unavailable', ''] else [] %}
            {% set hinnat = state_attr('sensor.nordpool_oma', 'raw_today_and_tomorrow') %}
            
            {% if aktiiviset | length > 0 %}
              {% set start_idx = aktiiviset | min %}
              {% set loppu_idx = aktiiviset | max %}
              {% set ns = namespace(res=[]) %}
              {# base_day on AINA tämän päivän (tallennuspäivän) alku #}
              {% set base_day = now().replace(hour=0, minute=0, second=0, microsecond=0) %}

              {% for j in range(start_idx, loppu_idx + 1) %}
                {% set h_data = hinnat | selectattr('org', 'eq', j) | first | default(none) %}
                {# KORJATTU TÄSSÄ: Lisätään minuutit suoraan ilman jakojäännöstä, jolloin pvm vaihtuu oikein #}
                {% set jakso_aika = base_day + timedelta(minutes=j*15) %}
                {% set ns.res = ns.res + [{
                  'aloitus': jakso_aika.strftime('%d.%m.%Y %H:%M:%S'),
                  'hinta': h_data.val if h_data is mapping else 0,
                  'ladataanko': 'KYLLÄ' if j in aktiiviset else 'EI',
                  'idx': j
                }] %}
              {% endfor %}
              {{ ns.res }}
            {% else %} [] {% endif %}


  - trigger:
      - platform: state
        entity_id: input_text.lataus_suunnitelman_jaksot_v2
    sensor:
      - name: "Lataus Suunnitelma Lämmitin"
        unique_id: lataus_suunnitelma_v2
        state: "{{ now().strftime('%d.%m.%Y %H:%M:%S') }}"
        unit_of_measurement: "jaksoa"
        attributes:
          tallennus_aika: "{{ now().strftime('%d.%m.%Y klo %H:%M:%S') }}"
          jaksot: >
            {% set s_aktiivinen = states('input_text.lataus_suunnitelman_jaksot_v2') %}
            {% set aktiiviset = s_aktiivinen.split(',') | map('trim') | reject('eq', '') | map('int') | list if s_aktiivinen not in ['unknown', 'unavailable', ''] else [] %}
            {% set hinnat = state_attr('sensor.nordpool_oma', 'raw_today_and_tomorrow') %}
            
            {% if aktiiviset | length > 0 %}
              {% set start_idx = aktiiviset | min %}
              {% set loppu_idx = aktiiviset | max %}
              {% set ns = namespace(res=[]) %}
              {% set base_day = now().replace(hour=0, minute=0, second=0, microsecond=0) %}

              {% for j in range(start_idx, loppu_idx + 1) %}
                {% set h_data = hinnat | selectattr('org', 'eq', j) | first | default(none) %}
                {# KORJATTU TÄSSÄ SAMALLA TAVALLA: #}
                {% set jakso_aika = base_day + timedelta(minutes=j*15) %}
                {% set ns.res = ns.res + [{
                  'aloitus': jakso_aika.strftime('%d.%m.%Y %H:%M:%S'),
                  'hinta': h_data.val if h_data is mapping else 0,
                  'ladataanko': 'KYLLÄ' if j in aktiiviset else 'EI',
                  'idx': j
                }] %}
              {% endfor %}
              {{ ns.res }}
            {% else %} [] {% endif %}

  - sensor:
      # --- SÄHKÖAUTON TODELLINEN TEHO + LISÄKUORMA ---
      - name: "Sähköauto teho laskettu"
        unique_id: sahkoauto_teho_laskettu
        unit_of_measurement: "W"
        state: >-
          {% set mitattu = states('sensor.wiz_pistoke_15min_keskiarvo') | float(0) %}
          {% set lisa = states('input_number.sahkoauto_lisakuorma') | float(0) if is_state('input_boolean.sahkoauto_lisasetukset', 'on') else 0 %}
          {{ (mitattu + lisa) | round(0) }}

      # --- LÄMMITTIMEN TODELLINEN TEHO + LISÄKUORMA ---
      - name: "Lämmitin teho laskettu"
        unique_id: lammitin_teho_laskettu
        unit_of_measurement: "W"
        state: >-
          {% set mitattu = states('sensor.wiz_lammitin_15min_keskiarvo') | float(0) %}
          {% set lisa = states('input_number.lammitin_lisakuorma_v2') | float(0) if is_state('input_boolean.lammitin_lisasetukset_v2', 'on') else 0 %}
          {{ (mitattu + lisa) | round(0) }}

  - sensor:
      # --- SÄHKÖAUTON SÄÄSTÖLASKURI (KULUVA KUUKAUSI) ---
      - name: "Sähköauto säästö kuluva kuukausi"
        unique_id: sahkoauto_saasto_kuluva_kuukausi
        unit_of_measurement: "€"
        state: >-
          {% set historia = state_attr('sensor.lataushistoria_sahkoauto', 'lataukset') or [] %}
          {% set kuluva_kk = now().strftime('%m.%Y') %}
          {% set ns = namespace(saasto=0.0) %}
          
          {% for l in historia %}
            {# Varmistetaan että kyseessä on tämän kuun lataus ja arvot ovat olemassa #}
            {% if l.aloitus is defined and kuluva_kk in l.aloitus and l.kWh | float(0) > 0 %}
              {# Oletetaan maltillinen keskimääräinen säästö: 4 snt/kWh verrattuna päivän keskihintaan #}
              {# Voit myöhemmin dynaamisesti muuttaa tämän vertaamaan suoraan Nordpool-keskihintaan #}
              {% set ns.saasto = ns.saasto + (l.kWh | float(0) * 0.04) %}
            {% endif %}
          {% endfor %}
          {{ ns.saasto | round(2) }}

      # --- LÄMMITTIMEN SÄÄSTÖLASKURI (KULUVA KUUKAUSI) ---
      - name: "Lämmitin säästö kuluva kuukausi"
        unique_id: lammitin_saasto_kuluva_kuukausi
        unit_of_measurement: "€"
        state: >-
          {% set historia = state_attr('sensor.lataushistoria_lammitin_oikeat', 'lataukset') or [] %}
          {% set kuluva_kk = now().strftime('%m.%Y') %}
          {% set ns = namespace(saasto=0.0) %}
          
          {% for l in historia %}
            {% if l.aloitus is defined and kuluva_kk in l.aloitus and l.kWh | float(0) > 0 %}
              {% set ns.saasto = ns.saasto + (l.kWh | float(0) * 0.04) %}
            {% endif %}
          {% endfor %}
          {{ ns.saasto | round(2) }}


