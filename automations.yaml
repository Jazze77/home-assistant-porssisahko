- id: '1780507816572'
  alias: Nordpool Midnight Cleanup v0.16 AINA PÄÄLLÄ
  description: Siirtää molempien pistokkeiden listat ja nollaa mittarit
  triggers:
  - at: 00:00:00
    trigger: time
  actions:
  - repeat:
      for_each:
      - input_text.valitut_jaksot_luonnos
      - input_text.valitut_jaksot_aktiivinen
      - input_text.valitut_jaksot_grid
      - input_text.valitut_jaksot_luonnos_v2
      - input_text.valitut_jaksot_aktiivinen_v2
      - input_text.valitut_jaksot_grid_v2
      sequence:
      - action: input_text.set_value
        target:
          entity_id: '{{ repeat.item }}'
        data:
          value: "{% set s = states(repeat.item) %} {% if s and s not in ['unknown',
            'unavailable', 'none', ''] %}\n  {% set jaksot = s.split(',') | map('int')
            | list %}\n  {% set ns = namespace(uudet=[]) %}\n  {% for j in jaksot
            %}\n    {% if j >= 96 %}\n      {% set ns.uudet = ns.uudet + [j - 96]
            %}\n    {% endif %}\n  {% endfor %}\n  {{ ns.uudet | sort | join(',')
            }}\n{% else %}\n  \"\"\n{% endif %}\n"
  - action: input_select.select_option
    target:
      entity_id:
      - input_select.lataus_paiva
      - input_select.lataus_paiva_v2
    data:
      option: Tänään
  - action: system_log.write
    data:
      level: warning
      logger: custom_components.nordpool_cleanup
      message: Nordpool keskiyön siivous v0.16 suoritettu. Molempien laitteiden (Sähköauto
        & Lämmitin) jaksot siirretty.
  mode: single
- id: '1780507889132'
  alias: 'Nordpool palvelun Valvonta: AINA PÄÄLLÄ'
  description: Tarkistaa onko 15 minuutin hintatieto päivittynyt
  triggers:
  - minutes: /5
    trigger: time_pattern
  actions:
  - if:
    - condition: template
      value_template: '{# Lasketaan sekunnit viimeisestä päivityksestä #} {{ (now()
        - states.sensor.nordpool_kwh_fi_eur_3_10_0255.last_updated).total_seconds()
        > 1200 }}

        '
    then:
    - target:
        entity_id: input_boolean.nordpool_state
      action: input_boolean.turn_off
    - data:
        level: error
        message: 'VAROITUS: Nordpool-hinta ei ole päivittynyt 20 minuuttiin (15min
          sähkö)!'
      action: system_log.write
    else:
    - target:
        entity_id: input_boolean.nordpool_state
      action: input_boolean.turn_on
- id: '1780507949526'
  alias: 'Nordpool: Automaattinen jaksojen haku hintojen julkaisusta AINA PÄÄLLÄ'
  description: Hakee halvimmat jaksot luonnoksiin heti, kun huomisen hinnat vahvistuvat
  triggers:
  - trigger: state
    entity_id: sensor.nordpool_oma
    attribute: tomorrow_valid
    from: false
    to: true
  actions:
  - action: script.laske_halvimmat_jaksot
  - action: script.laske_halvimmat_jaksot_v2
  - action: persistent_notification.create
    data:
      title: "\U0001F4CA Pörssisähkö: Päivän ehdotukset valmiina"
      message: 'Huomisen pörssisähköhinnat on julkaistu ja vahvistettu (klo {{ now().strftime(''%H:%M'')
        }}).

        Automaatti on laskenut valmiiksi ehdotukset **Sähköautolle** ja **Lämmittimelle**
        asetettujen oletuskestojen mukaan. Käy tarkistamassa ja tallentamassa jaksot
        Dashboardilta!'
      notification_id: nordpool_ehdotukset_valmiina
  mode: single
- id: '1780508004897'
  alias: Latauksen simulaatio v1.2
  description: Sähköauton simulaatio tiiviillä indeksi:teho -tallennuksella
  triggers:
  - trigger: state
    entity_id: automation.latauksen_simulaatio_v1_2
    to: 'on'
  actions:
  - variables:
      aloitus_idx: '{{ (now().hour * 4) + (now().minute // 15) }}'
      loppu_idx: '{% set t_osat = states(''input_datetime.lataus_valmis_klo'').split('':'')
        %} {% set h = t_osat[0] | int(0) %}{% set m = t_osat[1] | int(0) %}  {% set
        base = (h * 4) + (m // 15) %}  {% set aloitus = (now().hour * 4) + (now().minute
        // 15) %}  {{ base + 96 if base < aloitus else base }}'
      kierrokset: '{{ (loppu_idx | int - aloitus_idx | int) | int + 1 }}'
      aktiiviset_jaksot: '{{ states(''input_text.valitut_jaksot_aktiivinen'').split('','')
        | map(''trim'') | list }}'
  - action: input_text.set_value
    target:
      entity_id:
      - input_text.lataus_tehot_luonnos
      - input_text.lataus_tehot_luonnos_part2
    data:
      value: ''
  - repeat:
      count: '{{ kierrokset }}'
      sequence:
      - variables:
          curr_idx: '{{ aloitus_idx | int + repeat.index - 1 }}'
          on_valittu: '{{ curr_idx | string in aktiiviset_jaksot }}'
          perusteho: '{% if on_valittu %}{{ (100 + range(0, 201) | random) }}{% else
            %}0{% endif %}'
          lisa: '{{ states(''input_number.sahkoauto_lisakuorma'') | float(0) if (is_state(''input_boolean.sahkoauto_lisasetukset'',
            ''on'') and on_valittu) else 0 }}'
          teho_nyt: '{{ (perusteho | float(0) + lisa) | int }}'
      - action: input_number.set_value
        target:
          entity_id: input_number.simulaatio_vaihe_idx
        data:
          value: '{{ curr_idx }}'
      - action: system_log.write
        data:
          level: warning
          logger: custom_components.lataus_sahkoauto
          message: 'SIMULAATIO sähköauto: Jakso {{ curr_idx }}. Pistoke: {{ ''PÄÄLLÄ''
            if on_valittu else ''POIS'' }}. Teho: {{ teho_nyt }} W.'
      - action: light.turn_on
        target:
          entity_id: light.hue_essential_lamp_1
        data:
          brightness_pct: '{{ 100 if on_valittu else 10 }}'
      - delay:
          seconds: 2
      - action: input_text.set_value
        target:
          entity_id: "{% if states('input_text.lataus_tehot_luonnos') | length >=
            245 or '*' in states('input_text.lataus_tehot_luonnos') %}\n  input_text.lataus_tehot_luonnos_part2\n{%
            else %}\n  input_text.lataus_tehot_luonnos\n{% endif %}"
        data:
          value: "{% set t1 = states('input_text.lataus_tehot_luonnos') %} {% set
            t2 = states('input_text.lataus_tehot_luonnos_part2') %} {% set uusi_pari
            = (curr_idx | string) + \":\" + (teho_nyt | string) %}\n{% if t1 | length
            >= 245 or '*' in t1 %}\n  {# Kirjoitetaan kakkoskenttään #}\n  {% if t2
            == \"\" %}{{ uusi_pari }}{% else %}{{ t2 ~ \",\" ~ uusi_pari }}{% endif
            %}\n{% else %}\n  {# Kirjoitetaan ykköskenttään #}\n  {% if (t1 ~ \",\"
            ~ uusi_pari) | length >= 245 %}\n    {# Jos tämä pari rikkoisi rajan,
            laitetaan loppuun tähti ja uusi pari valmiiksi kakkoskentän nollaukseen
            #}\n    {{ t1 ~ \",*\" }}\n  {% else %}\n    {% if t1 == \"\" %}{{ uusi_pari
            }}{% else %}{{ t1 ~ \",\" ~ uusi_pari }}{% endif %}\n  {% endif %}\n{%
            endif %}"
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ states(''input_text.lataus_tehot_luonnos'').endswith(''*'')
              and states(''input_text.lataus_tehot_luonnos_part2'') == '''' }}'
          sequence:
          - action: input_text.set_value
            target:
              entity_id: input_text.lataus_tehot_luonnos_part2
            data:
              value: '{{ (curr_idx | string) + '':'' + (teho_nyt | string) }}'
  - action: light.turn_off
    target:
      entity_id: light.hue_essential_lamp_1
  - action: script.lataus_valmis
  - action: automation.turn_off
    target:
      entity_id: automation.latauksen_simulaatio_v1_2
  mode: single
  initial_state: false
- id: '1780508029777'
  alias: Latauksen simulaatio Lämmitin
  description: Lämmittimen simulaatio automaattisella keskiyön tunnistuksella ja lisäkuormalla
  triggers:
  - trigger: state
    entity_id: automation.latauksen_simulaatio_lammitin
    to: 'on'
  actions:
  - variables:
      aloitus_idx: '{{ (now().hour * 4) + (now().minute // 15) }}'
      loppu_idx: '{% set t_osat = states(''input_datetime.lataus_valmis_klo_v2'').split('':'')
        %} {% set h = t_osat[0] | int(0) %}{% set m = t_osat[1] | int(0) %} {% set
        base = (h * 4) + (m // 15) %} {% set aloitus = (now().hour * 4) + (now().minute
        // 15) %} {{ base + 96 if base < aloitus else base }}'
      kierrokset: '{{ (loppu_idx | int - aloitus_idx | int) | int + 1 }}'
      aktiiviset_jaksot: '{{ states(''input_text.valitut_jaksot_aktiivinen_v2'').split('','')
        | map(''trim'') | list }}'
  - action: input_text.set_value
    target:
      entity_id:
      - input_text.lataus_tehot_luonnos_v2
      - input_text.lataus_tehot_luonnos_v2_part2
    data:
      value: ''
  - repeat:
      count: '{{ kierrokset }}'
      sequence:
      - variables:
          curr_idx: '{{ aloitus_idx | int + repeat.index - 1 }}'
          on_valittu: '{{ curr_idx | string in aktiiviset_jaksot }}'
          perusteho: "{% if on_valittu %}\n  {{ (100 + range(0, 201) | random) }}\n{%
            else %}\n  0\n{% endif %}\n"
          lisa: '{{ states(''input_number.lammitin_lisakuorma_v2'') | float(0) if
            (is_state(''input_boolean.lammitin_lisasetukset_v2'', ''on'') and on_valittu)
            else 0 }}'
          teho_nyt: '{{ (perusteho | float(0) + lisa) | int }}'
      - action: input_number.set_value
        target:
          entity_id: input_number.simulaatio_vaihe_idx
        data:
          value: '{{ curr_idx }}'
      - action: system_log.write
        data:
          level: warning
          logger: custom_components.lataus_lammitin
          message: 'SIMULAATIO lämmitin: Jakso {{ curr_idx }}. Pistoke: {{ ''PÄÄLLÄ''
            if on_valittu else ''POIS'' }}. Teho: {{ teho_nyt }} W.'
      - action: light.turn_on
        target:
          entity_id: light.hue_essential_lamp_1
        data:
          brightness_pct: '{{ 100 if on_valittu else 10 }}'
          rgb_color:
          - 0
          - 255
          - 0
      - delay:
          seconds: 2
      - action: input_text.set_value
        target:
          entity_id: "{% if states('input_text.lataus_tehot_luonnos_v2') | length
            >= 245 or '*' in states('input_text.lataus_tehot_luonnos_v2') %}\n  input_text.lataus_tehot_luonnos_v2_part2\n{%
            else %}\n  input_text.lataus_tehot_luonnos_v2\n{% endif %}"
        data:
          value: "{% set t1 = states('input_text.lataus_tehot_luonnos_v2') %} {% set
            t2 = states('input_text.lataus_tehot_luonnos_v2_part2') %} {% set uusi_pari
            = (curr_idx | string) + \":\" + (teho_nyt | string) %}\n{% if t1 | length
            >= 245 or '*' in t1 %}\n  {% if t2 == \"\" %}{{ uusi_pari }}{% else %}{{
            t2 ~ \",\" ~ uusi_pari }}{% endif %}\n{% else %}\n  {% if (t1 ~ \",\"
            ~ uusi_pari) | length >= 245 %}\n    {{ t1 ~ \",*\" }}\n  {% else %}\n
            \   {% if t1 == \"\" %}{{ uusi_pari }}{% else %}{{ t1 ~ \",\" ~ uusi_pari
            }}{% endif %}\n  {% endif %}\n{% endif %}"
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ states(''input_text.lataus_tehot_luonnos_v2'').endswith(''*'')
              and states(''input_text.lataus_tehot_luonnos_v2_part2'') == '''' }}'
          sequence:
          - action: input_text.set_value
            target:
              entity_id: input_text.lataus_tehot_luonnos_v2_part2
            data:
              value: '{{ (curr_idx | string) + '':'' + (teho_nyt | string) }}'
  - action: light.turn_off
    target:
      entity_id: light.hue_essential_lamp_1
  - action: script.lataus_valmis_v2
  - action: automation.turn_off
    target:
      entity_id: automation.latauksen_simulaatio_lammitin
  mode: single
  initial_state: false
- id: '1780508059491'
  alias: Reaaliaikainen lataus Lämmitin
  description: Lämmittimen ohjaus suojatulla teholaskennalla
  triggers:
  - trigger: state
    entity_id: automation.reaaliaikainen_lataus_lammitin
    to: 'on'
  actions:
  - variables:
      valmis_data: '{{ states(''input_datetime.lataus_valmis_klo_v2'').split('':'')
        }}'
      paiva: '{{ states(''input_select.lataus_paiva_v2'') }}'
      loppu_idx: '{% set h = valmis_data[0] | int(0) %} {% set m = valmis_data[1]
        | int(0) %} {% set base = (h * 4) + (m // 15) %} {{ base + 96 if paiva ==
        ''Huomenna'' else base }}

        '
      aloitus_idx: '{{ (now().hour * 4) + (now().minute // 15) }}'
      kierrokset: '{{ (loppu_idx - aloitus_idx) | int + 1 }}'
      aktiiviset_jaksot: '{{ states(''input_text.valitut_jaksot_aktiivinen_v2'').split('','')
        | map(''trim'') | list }}'
  - action: input_text.set_value
    target:
      entity_id:
      - input_text.lataus_tehot_luonnos_v2
      - input_text.lataus_tehot_luonnos_v2_part2
    data:
      value: ''
  - repeat:
      count: '{{ kierrokset }}'
      sequence:
      - variables:
          curr_idx: '{{ aloitus_idx | int + repeat.index - 1 }}'
          on_valittu: '{{ curr_idx | string in aktiiviset_jaksot }}'
          sekuntia_seuraavaan: '{% set m = now().minute %} {% set s = now().second
            %} {% set m_next = ((m // 15) + 1) * 15 %} {{ ((m_next - m) * 60) - s
            }}

            '
          teho_nyt: '{{ (states(''sensor.lammitin_teho_laskettu'') | float(0) | int)
            if on_valittu else 0 }}'
      - action: switch.{{ 'turn_on' if on_valittu else 'turn_off' }}
        target:
          entity_id: switch.wiz_socket_98d017
      - action: system_log.write
        data:
          level: warning
          logger: custom_components.lataus_lammitin
          message: 'LATAUS lämmitin: Jakso {{ curr_idx }}. Pistoke: {{ ''PÄÄLLÄ''
            if on_valittu else ''POIS'' }}. Teho: {{ teho_nyt }} W.'
      - delay:
          seconds: '{{ sekuntia_seuraavaan }}'
      - action: input_text.set_value
        target:
          entity_id: "{% if states('input_text.lataus_tehot_luonnos_v2') | length
            >= 245 or '*' in states('input_text.lataus_tehot_luonnos_v2') %}\n  input_text.lataus_tehot_luonnos_v2_part2\n{%
            else %}\n  input_text.lataus_tehot_luonnos_v2\n{% endif %}"
        data:
          value: "{% set t1 = states('input_text.lataus_tehot_luonnos_v2') %} {% set
            t2 = states('input_text.lataus_tehot_luonnos_v2_part2') %} {% set uusi_pari
            = (curr_idx | string) + \":\" + (teho_nyt | string) %}\n{% if t1 | length
            >= 245 or '*' in t1 %}\n  {% if t2 == \"\" %}{{ uusi_pari }}{% else %}{{
            t2 ~ \",\" ~ uusi_pari }}{% endif %}\n{% else %}\n  {% if (t1 ~ \",\"
            ~ uusi_pari) | length >= 245 %}\n    {{ t1 ~ \",*\" }}\n  {% else %}\n
            \   {% if t1 == \"\" %}{{ uusi_pari }}{% else %}{{ t1 ~ \",\" ~ uusi_pari
            }}{% endif %}\n  {% endif %}\n{% endif %}"
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ states(''input_text.lataus_tehot_luonnos_v2'').endswith(''*'')
              and states(''input_text.lataus_tehot_luonnos_v2_part2'') == '''' }}'
          sequence:
          - action: input_text.set_value
            target:
              entity_id: input_text.lataus_tehot_luonnos_v2_part2
            data:
              value: '{{ (curr_idx | string) + '':'' + (teho_nyt | string) }}'
  - action: switch.turn_off
    target:
      entity_id: switch.wiz_socket_98d017
  - action: script.lataus_valmis_v2
  - action: automation.turn_off
    target:
      entity_id: automation.reaaliaikainen_lataus_lammitin
  mode: single
