    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.lataus_alkaa_klo
      data:
        time: >
          {% set nykyinen = states('input_datetime.lataus_alkaa_klo').split(':') %}
          {% set h = (nykyinen[0]|int + muutos) % 24 %}
          {{ "%02d:%s:%s" | format(h, nykyinen[1], nykyinen[2]) }}
    - action: script.laske_halvimmat_jaksot # KORJAUS: Lasketaan uusi luonnos heti

muuta_lataus_alkaa_minuutit:
  alias: "Sähköauto: Muuta aloitusaikaa minuuteilla"
  sequence:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.lataus_alkaa_klo
      data:
        time: >
          {% set nykyinen = states('input_datetime.lataus_alkaa_klo').split(':') %}
          {% set m = (nykyinen[1]|int + muutos) %}
          {% if m >= 60 %}{% set m = 0 %}{% elif m < 0 %}{% set m = 45 %}{% endif %}
          {{ "%s:%02d:%s" | format(nykyinen[0], m, nykyinen[2]) }}
    - action: script.laske_halvimmat_jaksot # KORJAUS: Lasketaan uusi luonnos heti

laske_halvimmat_jaksot:
  alias: "Sähköauto: Laske halvimmat jaksot"
  sequence:
    - variables:
        hinnat: "{{ state_attr('sensor.nordpool_oma', 'raw_today_and_tomorrow') }}"
        maara: "{{ states('input_number.lataus_kesto_jaksot') | int(0) }}"
        paiva: "{{ states('input_select.lataus_paiva') }}"
        
        # KORJAUS: Haetaan aloitusindeksi käyttäjän valitsemasta kellonajasta
        alku_klo: "{{ states('input_datetime.lataus_alkaa_klo').split(':') }}"
        nyt_idx: >-
          {% set h = alku_klo[0] | int(0) %}{% set m = alku_klo[1] | int(0) %}
          {{ (h * 4) + (m // 15) }}
        
        # Haetaan loppuindeksi valmiskellonajasta
        valmis_klo: "{{ states('input_datetime.lataus_valmis_klo').split(':') }}"
        loppu_idx: >-
          {% set h = valmis_klo[0] | int(0) %}{% set m = valmis_klo[1] | int(0) %}
          {% set base = (h * 4) + (m // 15) %}
          {{ base + 96 if paiva == 'Huomenna' else base }}

        valitut: >-
          {% if hinnat is iterable and maara > 0 %}
            {% set lista = hinnat | selectattr('org', 'ge', nyt_idx | int) | selectattr('org', 'le', loppu_idx | int) | sort(attribute='val') %}
            {% set poimitut = lista[:maara] | map(attribute='org') | list %}
            {{ poimitut | sort | join(',') }}
          {% else %}
            ""
          {% endif %}

    - action: input_text.set_value
      target:
        entity_id: input_text.valitut_jaksot_luonnos
      data:
        value: "{{ valitut }}"

  
          
laske_latausikkuna:
  alias: "Laske optimaalinen latausikkuna"
  sequence:
    - action: input_text.set_value
      target:
        entity_id: input_text.valitut_jaksot_luonnos
      data:
        value: >
          {# 1. Aika-ikkuna ja kesto #}
          {% set valmis_data = states('input_datetime.lataus_valmis_klo').split(':') %}
          {% set paiva = states('input_select.lataus_paiva') %}
          {% set h_valmis = valmis_data[0] | int(0) %}
          {% set m_valmis = valmis_data[1] | int(0) %}
          {% set loppu_idx = (h_valmis * 4) + (m_valmis // 15) %}
          {% set loppu_idx = loppu_idx + 96 if paiva == 'Huomenna' else loppu_idx %}
          {% set aloitus_idx = (now().hour * 4) + (now().minute // 15) %}
          {% set kesto = states('input_number.lataus_kesto_jaksot') | int(0) %}
          
          {# 2. Haetaan hinnat ja etsitään X halvinta #}
          {% set hinnat = state_attr('sensor.nordpool_oma', 'raw_today_and_tomorrow') %}
          {% if hinnat is iterable and kesto > 0 %}
            {% set ikkuna = hinnat | selectattr('org', 'ge', aloitus_idx) | selectattr('org', 'le', loppu_idx) | list %}
            
            {# Otetaan aina täysi määrä (kesto) halvimpia #}
            {% set automaatti_valinnat = ikkuna | sort(attribute='val') | list %}
            {% set valitut_automaatti = automaatti_valinnat[:kesto] | map(attribute='org') | list %}
            
            {{ valitut_automaatti | sort | join(',') }}
          {% else %}
            {# KORJAUS: Jätetään tämä täysin tyhjäksi ilman lainausmerkkejä, jolloin kenttä nollautuu oikein #}
          {% endif %}
          
lataa_sahkoauton_oletukset:
  alias: "Sähköauto: Lataa oletusasetukset"
  sequence:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.lataus_alkaa_klo
      data:
        # KORJATTU: Poistettu sana _top_ muuttujan nimestä
        time: "{{ states('input_datetime.sahkoauto_oletus_aloitus') if states('input_datetime.sahkoauto_oletus_aloitus') not in ['unknown','unavailable'] else '22:00:00' }}"
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.lataus_valmis_klo
      data:
        time: "{{ states('input_datetime.sahkoauto_oletus_lopetus') if states('input_datetime.sahkoauto_oletus_lopetus') not in ['unknown','unavailable'] else '07:00:00' }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.lataus_kesto_jaksot
      data:
        value: "{{ states('input_number.sahkoauto_oletus_kesto') | int(0) }}"
    - action: script.laske_halvimmat_jaksot



lataa_lammityksen_oletukset:
