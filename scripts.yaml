esitayta_halvimmat:
  alias: "Valitse 12 halvinta tästä hetkestä eteenpäin"
  sequence:
    - service: input_text.set_value
      target:
        entity_id: input_text.valitut_jaksot_luonnos
      data:
        value: >
          {% set hinnat = state_attr('sensor.nordpool_oma', 'raw_today_and_tomorrow') %}
          {% set current_org = (now().hour * 4) + (now().minute // 15) %}
          
          {% if hinnat is iterable and hinnat | length > 0 %}
            {# 1. Otetaan vain tulevat jaksot #}
            {% set tulevat = hinnat | selectattr('org', 'ge', current_org) | list %}
            
            {# 2. Järjestetään ne hinnan (val) mukaan halvimmasta alkaen #}
            {% set halvimmat_tulevat = tulevat | sort(attribute='val') %}
            
            {# 3. Otetaan 12 ensimmäistä (eli halvinta) ja järjestetään ne ajallisesti (org) #}
            {{ halvimmat_tulevat[:(states('input_number.lataus_kesto_jaksot') | int(12))] | map(attribute='org') | sort | join(',') }}
          {% else %}
            {{ states('input_text.valitut_jaksot_luonnos') }}
          {% endif %}

tallenna_valinnat_ei:
  alias: "Tallenna ja ota käyttöön"
  sequence:
    - variables:
        luonnos_raw: "{{ states('input_text.valitut_jaksot_luonnos').split(',') | map('trim') | reject('eq', '') | list }}"
        grid_raw: "{{ states('input_text.valitut_jaksot_grid').split(',') | map('trim') | reject('eq', '') | list }}"
        kaikki_ehdotetut: "{{ (luonnos_raw + grid_raw) | map('int') | unique | list }}"
        hinnat: "{{ state_attr('sensor.nordpool_oma', 'raw_today_and_tomorrow') }}"
        
        # 1. Lasketaan käyttäjän valitsema aloitus-indeksi
        valittu_aloitus_osat: "{{ states('input_datetime.lataus_alkaa_klo').split(':') }}"
        valittu_aloitus_idx: "{{ (valittu_aloitus_osat[0]|int(0) * 4) + (valittu_aloitus_osat[1]|int(0) // 15) }}"
        
        # 2. Lasketaan reaaliaikainen kuluva jaksoindeksi juuri nyt
        reaaliaikainen_nyt_idx: "{{ (now().hour * 4) + (now().minute // 15) }}"
        
        # KORJAUS: Alarajaksi valitaan suurin näistä kahdesta (kumpi on myöhemmin)
        alku_idx: "{{ [valittu_aloitus_idx|int, reaaliaikainen_nyt_idx|int] | max }}"
        
        # 3. Lasketaan valittu takaraja-indeksi (YLÄRAJA)
        loppu_osat: "{{ states('input_datetime.lataus_valmis_klo').split(':') }}"
        base_loppu: "{{ (loppu_osat[0]|int(0) * 4) + (loppu_osat[1]|int(0) // 15) }}"
        loppu_idx: "{{ base_loppu | int + 96 if states('input_select.lataus_paiva') == 'Huomenna' else base_loppu | int }}"

        # Suodatetaan aktiiviset uuden dynaamisen ALARAJAN mukaan
        aktiiviset: >-
          {% set ns = namespace(uudet=[]) %}
          {% for j in kaikki_ehdotetut %}
            {% if j >= alku_idx | int and j <= loppu_idx | int %}{% set ns.uudet = ns.uudet + [j] %}{% endif %}
          {% endfor %}
          {{ ns.uudet | sort | list }}

        # Suodatetaan myös grid-ruudukko siistiksi
        grid_siivottu: >-
          {% set ns = namespace(uudet=[]) %}
          {% for j in grid_raw %}
            {% if j | int >= alku_idx | int and j | int <= loppu_idx | int %}{% set ns.uudet = ns.uudet + [j] %}{% endif %}
          {% endfor %}
          {{ ns.uudet | join(',') }}

        valmis_klo_naytto: >-
          {% set h = loppu_osat[0]|int %}
          {% set m = loppu_osat[1]|int + 14 %}
          {% if m >= 60 %}{% set m = m - 60 %}{% set h = h + 1 %}{% endif %}
          {% if h >= 24 %}{% set h = 0 %}{% endif %}
          {{ "%02d:%02d:59" | format(h, m) }}

        valmis_pvm: >-
          {% set d = now() %}
          {% if states('input_select.lataus_paiva') == 'Huomenna' %}{% set d = d + timedelta(days=1) %}{% endif %}
          {{ d.strftime('%d.%m.%Y') }}

        kooste: >-
          {% set ns = namespace(items=[]) %}
          {% set st = now().replace(hour=0, minute=0, second=0, microsecond=0) %}
          {% for j in aktiiviset %}
            {% set h_data = hinnat | selectattr('org', 'eq', j) | first | default(none) %}
            {% set hinta = h_data.val if h_data is mapping else 0 %}
            {% set alku = st + timedelta(minutes=(j * 15)) %}
            {% set rivi = (loop.index | string) + ". " + alku.strftime('%d.%m.%Y %H:%M:%S') + "; " + (hinta | round(3) | string | replace('.',',')) + " snt" %}
            {% set ns.items = ns.items + [ rivi ] %}
          {% endfor %}
          {{ ns.items | join('\n') }}

    - action: input_text.set_value
      target:
        entity_id: input_text.valitut_jaksot_grid
      data:
        value: "{{ grid_siivottu }}"

    - action: input_text.set_value
      target:
        entity_id: 
          - input_text.valitut_jaksot_aktiivinen
          - input_text.lataus_suunnitelman_jaksot
      data:
        value: "{{ aktiiviset | join(',') }}"

    - action: persistent_notification.create
      data:
        title: "✅ Ohjaus tallennettu ({{ now().strftime('%d.%m.%Y klo %H:%M:%S') }})"
        message: >-
          Valittu **{{ aktiiviset | length }}** jaksoa. Yhteensä latausaika **{{ (aktiiviset|length * 15) // 60 }}h {{ (aktiiviset|length * 15) % 60 }} min**.
          
          Lataus valmistuu: **{{ valmis_pvm }} {{ valmis_klo_naytto }}**

          **Käytössä olevat ajat:**
          
          {{ kooste }}
        notification_id: "ohjaus_paivitetty"


