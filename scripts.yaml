keskeyta_lataus:
  alias: "Keskeytä lataus ja raportoi"
  sequence:
    # 1. Pysäytetään toiminnot välittömästi
    - action: automation.turn_off
      target:
        entity_id: automation.reaaliaikainen_lataus_v1_1
    - action: switch.turn_off
      target:
        entity_id: switch.wiz_socket_900c4e
    - action: light.turn_off
      target:
        entity_id: light.hue_essential_lamp_1_2

    # 2. Luodaan raportti lukitun suunnitelman pohjalta
    - action: persistent_notification.create
      data:
        title: "⚠️ Lataus keskeytetty"
        message: >
          {% set suunnitelma = state_attr('sensor.lataus_suunnitelma', 'jaksot') %}
          {% set vaihe_kpl = states('sensor.lataus_suunnitelma') | int(0) %}
          {% set tallennettu = state_attr('sensor.lataus_suunnitelma', 'tallennus_aika') %}
          {% set ns = namespace(items=[], snt=0, kwh=0) %}
          
          {% for p in suunnitelma %}
            {% set i = loop.index0 %}
            {% if i < vaihe_kpl %}
              {# Jakso suoritettiin ennen keskeytystä #}
              {% set teho_w = p.teho | float(0) %}
              {% set jakso_kwh = (teho_w / 1000) * 0.25 %}
              {% if p.ladataanko == 'KYLLÄ' %}
                {% set ns.snt = ns.snt + (p.hinta * jakso_kwh) %}
                {% set ns.kwh = ns.kwh + jakso_kwh %}
                {% set status = (teho_w | round(0) | string) ~ " W" %}
              {% else %}
                {% set status = "0 W" %}
              {% endif %}
            {% elif i == vaihe_kpl %}
              {# Jakso, jonka aikana keskeytys tapahtui #}
              {% set status = "⚠️ KESKEYTYS" %}
            {% else %}
              {# Tulevat jaksot #}
              {% set status = "EI LADATTU" %}
            {% endif %}
            
            {% set rivi = (loop.index | string) + ". " + p.aloitus + "; " + (p.hinta | round(3) | string | replace('.',',')) + " snt ; " + status %}
            {% set ns.items = ns.items + [ rivi ] %}
          {% endfor %}

          Lataus keskeytetty manuaalisesti hetkellä: **{{ now().strftime('%d.%m.%Y klo %H:%M:%S') }}**.
          
          Ladattu ennen keskeytystä: **{{ ns.kwh | round(2) | string | replace('.',',') }} kWh** | **{{ (ns.snt / 100) | round(2) | string | replace('.',',') }} €**

          **Toteutuma keskeytykseen asti:**
          
          {{ ns.items | join('\n') }}
        notification_id: "lataus_keskeytys_raportti"

          
# =================================================================
# SÄHKÖAUTO (v1) - RAPORTTI JA KÄNNYKKÄILMOITUS
# =================================================================
lataus_valmis:
  alias: "Sähköauto: Lataus valmis -raportti ja tyhjennys"
  sequence:
    - variables:
        suunnitelma: "{{ state_attr('sensor.lataus_suunnitelma', 'jaksot') }}"
        teho_parit: >-
          {% set t1 = states('input_text.lataus_tehot_luonnos') | replace(',*', '') | replace('*', '') %}
          {% set t2 = states('input_text.lataus_tehot_luonnos_part2') %}
          {% set koko_teksti = t1 if t2 == "" else t1 ~ "," ~ t2 %}
          {% set raw = koko_teksti.split(',') | map('trim') | reject('eq', '') | list %}
          {% set ns = namespace(lista=[]) %}
          {% for p in raw %}
            {% set osat = p.split(':') %}
            {% if osat | length == 2 %}
              {% set ns.lista = ns.lista + [[osat[0] | int, osat[1] | float(0)]] %}
            {% endif %}
          {% endfor %}
          {{ ns.lista }}
        
        raportti_teksti: >-
          {% set ns = namespace(items=[], snt=0, kwh=0, t_idx=1) %}
          {% for p in suunnitelma %}
            {% set haku = teho_parit | selectattr('0', 'eq', p.idx | int) | first | default(none) %}
            {% set t_w = haku[1] | float(0) if haku is not none and haku | length == 2 else 0 %}
            {% set j_kwh = (t_w / 1000) * 0.25 %}
            {% if p.ladataanko == 'KYLLÄ' %}
              {% set ns.snt = ns.snt + (p.hinta * j_kwh) %}
              {% set ns.kwh = ns.kwh + j_kwh %}
              {% set status = (t_w | round(0) | string) ~ " W" %}
            {% else %}
              {% set status = "EI LADATA" %}
            {% endif %}
            {% set ns.items = ns.items + [ (ns.t_idx | string) + ". " + p.aloitus + "; " + (p.hinta | round(3) | string | replace('.',',')) + " snt ; " + status ] %}
            {% set ns.t_idx = ns.t_idx + 1 %}
          {% endfor %}
          Lataus päättynyt.
          Yhteensä: **{{ ns.kwh | round(2) | string | replace('.',',') }} kWh** | **{{ (ns.snt / 100) | round(2) | string | replace('.',',') }} €**

          **Suoritetut jaksot:**
          {{ ns.items | join('\n') }}

    - action: persistent_notification.create
      data:
        title: "🔋 Sähköauto: Lataus valmis ({{ now().strftime('%d.%m.%Y klo %H:%M:%S') }})"
        message: "{{ raportti_teksti }}"
        notification_id: "lataus_valmis_raportti"

    # --- KORJATTU PUSH-ILMOITUS JAKE ONEPLUS ---
    #- action: notify.mobile_app_jake_oneplus
    #  data:
    #    title: "🚗 Sähköauto: Lataus valmis!"
    #    # KORJAUS: Otetaan suoraan valmiista tekstistä se Yhteensä-rivi purettuna siistiksi
    #    message: "{{ raportti_teksti.split('Lataus päättynyt.')[1].split('**Suoritetut jaksot:**')[0] | replace('**', '') | trim }}"
    #    data:
    #      tag: "lataus-valmis"
    #      ttl: 0
    #      priority: high

    - action: input_text.set_value
      target:
        entity_id:
          - input_text.valitut_jaksot_luonnos
          - input_text.valitut_jaksot_grid
          - input_text.valitut_jaksot_aktiivinen
      data:
        value: ""

