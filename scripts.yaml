kaynnista_simulaatio:
  alias: "Käynnistä Simulaatio Ketju"
  sequence:
    # 1. Tallentaa luonnoksen aktiiviseksi ja antaa ensimmäisen raportin
    - action: script.tallenna_valinnat2
    # 2. Käynnistää lampun vilkutuksen (automaatio sammuttaa itsensä lopuksi)
    - action: automation.turn_on
      target:
        entity_id: automation.latauksen_simulaatio_v1_2
  mode: single

kaynnista_simulaatio_lammitin:
  alias: "Lämmitin: Käynnistä simulaatio"
  sequence:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.lataus_aloitettu_klo_v2
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - action: automation.turn_on
      target:
        entity_id: automation.latauksen_simulaatio_lammitin

keskeyta_simulaatio_lammitin:
  alias: "Lämmitin: Keskeytä simulaatio"
  sequence:
    - action: automation.turn_off
      target:
        entity_id: automation.latauksen_simulaatio_lammitin
    - action: light.turn_off
      target:
        entity_id: light.hue_essential_lamp_1_2
    - action: persistent_notification.create
      data:
        title: "⚠️ Lämmitin: Simulaatio keskeytetty"
        message: "Simulaatio pysäytetty manuaalisesti."


simulaatio_valmis:
  alias: "Simulaatio valmis -raportti"
  sequence:
    - variables:
        jakso_lista: >-
          {% set raw = states('input_text.valitut_jaksot_aktiivinen').split(',') | map('trim') | reject('eq', '') | map('int') | sort | list %}
          {{ raw }}
        hinnat: "{{ state_attr('sensor.nordpool_oma', 'raw_today_and_tomorrow') }}"
        jakson_kulutus_kwh: 0.5 
        teho_kw: 2.0
        maara: "{{ jakso_lista | length }}"
        yhteensa_kwh: "{{ (maara | int * jakson_kulutus_kwh) | round(2) }}"
        yhteensa_min: "{{ maara * 15 }}"
        kesto_h: "{{ yhteensa_min // 60 }}"
        kesto_min: "{{ yhteensa_min % 60 }}"
        
        kello_lista_data: >-
          {% set ns = namespace(items=[], total_snt=0) %}
          {% set tänään = now().replace(hour=0, minute=0, second=0, microsecond=0) %}
          {% for j in jakso_lista %}
            {% set h_data = hinnat | selectattr('org', 'eq', j) | first | default(none) %}
            {% set hinta = h_data.val if h_data is mapping else 0 %}
            {% set ns.total_snt = ns.total_snt + (hinta * jakson_kulutus_kwh) %}
            {% set alku = tänään + timedelta(minutes=j*15) %}
            {% set rivi = (loop.index | string) ~ ") " ~ alku.strftime('%d.%m.%Y %H:%M:%S') ~ "; " ~ (hinta | round(3) | string).replace('.',',') ~ " snt ; " ~ (teho_kw | round(1) | string).replace('.',',') ~ "kW" %}
            {% set ns.items = ns.items + [ rivi ] %}
          {% endfor %}
          {{ {'lista': ns.items | join('\n'), 'eurot': (ns.total_snt / 100) | round(2)} }}

    - action: persistent_notification.create
      data:
        title: "✅ Latausvalmis ({{ now().strftime('%d.%m.%Y klo %H:%M:%S') }})"
        message: >
          Valittu **{{ maara }}** jaksoa. **{{ kesto_h }}h {{ kesto_min }} min**.

          Yhteensä: **{{ yhteensa_kwh | string | replace('.',',') }} kWh** | **{{ kello_lista_data.eurot | string | replace('.',',') }} €**
          
          **Käytössä olevat ajat:**
          
          {{ kello_lista_data.lista }}
        notification_id: "simulaatio_raportti"

keskeyta_simulaatio:
  alias: "Keskeytä simulaatio ja raportoi"
  sequence:
    - variables:
        # Haetaan perustiedot ja varmistetaan numerotyypit
        v_idx: "{{ states('input_number.simulaatio_vaihe_idx') | int(0) }}"
        aktiiviset: "{{ states('input_text.valitut_jaksot_aktiivinen').split(',') | map('trim') | reject('eq', '') | map('int') | list }}"
        hinnat: "{{ state_attr('sensor.nordpool_oma', 'raw_today_and_tomorrow') }}"
        kwh_per_jakso: 0.5
        
        # 1. LADATUT JAKSOT: Lasketaan teksti ja eurot samalla kertaa
        ladatut_kooste: >-
          {% set jaksot = aktiiviset | select('le', v_idx) | list %}
          {% set ns = namespace(txt=[], snt=0) %}
          {% set st = now().replace(hour=0, minute=0, second=0, microsecond=0) %}
          {% for j in jaksot %}
            {% set h_data = hinnat | selectattr('org', 'eq', j) | first | default(none) %}
            {% set hinta = h_data.val if h_data is mapping else 0 %}
            {% set ns.snt = ns.snt + (hinta * 0.5) %}
            {% set alku = st + timedelta(minutes=(j * 15)) %}
            {% set rivi = (loop.index | string) ~ ") " ~ alku.strftime('%d.%m.%Y %H:%M:%S') ~ "; " ~ (hinta | round(3) | string | replace('.',',')) ~ " snt ; 2,0kW" %}
            {% set ns.txt = ns.txt + [rivi] %}
          {% endfor %}
          {{ {'lista': ns.txt | join('\n'), 'eurot': (ns.snt / 100) | round(3), 'kpl': jaksot | length} | to_json }}

        # 2. JÄÄNEET JAKSOT: Lasketaan vain teksti
        jaaneet_kooste: >-
          {% set jaksot = aktiiviset | select('gt', v_idx) | list %}
          {% set ns = namespace(txt=[]) %}
          {% set st = now().replace(hour=0, minute=0, second=0, microsecond=0) %}
          {% for j in jaksot %}
            {% set h_data = hinnat | selectattr('org', 'eq', j) | first | default(none) %}
            {% set hinta = h_data.val if h_data is mapping else 0 %}
            {% set alku = st + timedelta(minutes=(j * 15)) %}
            {% set rivi = (loop.index | string) ~ ") " ~ alku.strftime('%d.%m.%Y %H:%M:%S') ~ "; " ~ (hinta | round(3) | string | replace('.',',')) ~ " snt ; 2,0kW" %}
            {% set ns.txt = ns.txt + [rivi] %}
          {% endfor %}
          {{ {'lista': ns.txt | join('\n'), 'kpl': jaksot | length} | to_json }}

    - action: automation.turn_off
      target:
        entity_id: automation.latauksen_simulaatio_v1_2
    - action: light.turn_off
      target:
        entity_id: light.hue_essential_lamp_1_2

    - action: persistent_notification.create
      data:
        title: "⚠️ Lataus keskeytetty ({{ now().strftime('%d.%m.%Y klo %H:%M:%S') }})"
        message: >-
          {% set l = ladatut_kooste | from_json %}
          {% set j = jaaneet_kooste | from_json %}
          {% set kpl_yht = l.kpl + j.kpl %}
          
          Ladattu **{{ l.kpl }}/{{ kpl_yht }}** jaksoa. 
          (**{{ l.kpl * 15 }}min** / **{{ kpl_yht * 15 }}min**).
            
          Yhteensä: **{{ (l.kpl * 0.5) | string | replace('.',',') }} kWh** | **{{ l.eurot | string | replace('.',',') }} €**
            
          **Käytössä olleet jaksot:**
          {{ l.lista }}
          
          **Lataamatta jääneet jaksot:**
          {{ j.lista }}
            
          Lataus keskeytetty manuaalisesti.
        notification_id: "simulaatio_keskeytys_raportti"

keskeyta_simulaatio_simple:
  alias: "Keskeytä simulaatio ja raportoi"
  sequence:
    - action: automation.turn_off
      target:
        entity_id: automation.latauksen_simulaatio_v1_2
    - action: light.turn_off
      target:
        entity_id: light.hue_essential_lamp_1_2

    - action: persistent_notification.create
      data:
        title: "⚠️ Simulaatio keskeytetty"
        message: >
          {% set suunnitelma = state_attr('sensor.lataus_suunnitelma', 'jaksot') %}
          {% set vaihe_kpl = states('sensor.lataus_suunnitelma') | int(0) %}
          {% set ns = namespace(items=[], snt=0, kwh=0) %}
          
          {% for p in suunnitelma %}
            {% set i = loop.index0 %}
            {% if i < vaihe_kpl %}
              {% set teho_w = p.teho | float(0) %}
              {% set jakso_kwh = (teho_w / 1000) * 0.25 %}
              {% if p.ladataanko == 'KYLLÄ' %}
                {% set ns.snt = ns.snt + (p.hinta * jakso_kwh) %}
                {% set ns.kwh = ns.kwh + jakso_kwh %}
                {% set status = (teho_w | round(0) | string) ~ " W" %}
              {% else %}
                {% set status = "0 W" %}
              {% endif %}
            {% elif i == vaihe_kpl %}
              {% set status = "⚠️ KESKEYTYS" %}
            {% else %}
              {% set status = "EI LADATTU" %}
            {% endif %}
            {% set ns.items = ns.items + [ (loop.index | string) + ". " + p.aloitus + "; " + (p.hinta | round(3) | string | replace('.',',')) + " snt ; " + status ] %}
          {% endfor %}

          Simulaatio keskeytetty: **{{ now().strftime('%H:%M:%S') }}**.
          
          Suunnitellusta ladattu: **{{ ns.kwh | round(2) | string | replace('.',',') }} kWh**.

          **Toteutuma keskeytykseen asti:**
          
          {{ ns.items | join('\n') }}
        notification_id: "simulaatio_keskeytys_raportti"









