toggle_jakso:
  alias: "Vaihda jakson valintaa"
  fields:
    jakso_id:
      description: "Jakson numero 0-95"
      example: "5"
  sequence:
    - service: input_text.set_value
      target:
        entity_id: input_text.valitut_jaksot_luonnos
      data:
        value: >
          {% set nykyiset = states('input_text.valitut_jaksot_luonnos').split(',') | map('trim') | reject('eq', '') | list %}
          {% set uusi = jakso_id | string %}
          {% if uusi in nykyiset %}
            {{ nykyiset | reject('eq', uusi) | join(',') }}
          {% else %}
            {{ (nykyiset + [uusi]) | join(',') }}
          {% endif %}

    - service: input_text.set_value
      target:
        entity_id: input_text.valitut_jaksot_grid
      data:
        value: >
          {% set nykyiset = states('input_text.valitut_jaksot_grid').split(',') | map('trim') | reject('eq', '') | list %}
          {% set uusi = jakso_id | string %}
          {% if uusi in nykyiset %}
            {{ nykyiset | reject('eq', uusi) | join(',') }}
          {% else %}
            {{ (nykyiset + [uusi]) | join(',') }}
          {% endif %}
          
